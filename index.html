<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zauq - Urdu Literary Lounge</title>
  </head>
  <body>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem("zauq_theme") || "midnight";
          if (theme !== "midnight") {
            document.body.classList.add("theme-" + theme);
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
